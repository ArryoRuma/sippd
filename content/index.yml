seo:
  title: Sippd | Coffee Rating App
  description: Track every sip, rate every brew, and remember the coffees worth coming back to.
title: "Welcome to\nSippd."
description: Sippd is your personal coffee log to rate, review, and remember every cup.
hero:
  headline: "Happy Birthday, TK!"
  links:
    - label: Create free account
      color: primary
      size: xl
      to: /signup
    - label: Explore features
      size: xl
      color: neutral
      variant: soft
      to: '#features'
terminal:
  lines:
    - segments:
        - text: "$ "
          style: prompt
        - text: "sippd log"
          style: cmd
        - text: " --coffee \"Ethiopia Guji\""
          style: flag
    - segments:
        - text: "→ Roaster: Sey"
          style: dim
    - segments:
        - text: "→ Method: "
          style: dim
        - text: "V60"
          style: cmd
        - text: " | Origin: "
          style: dim
        - text: "Ethiopia"
          style: cmd
        - text: " | Score: "
          style: dim
        - text: "9.2"
          style: cmd
    - segments:
        - text: "→ Notes: "
          style: dim
        - text: "jasmine, peach, bergamot"
          style: success
    - segments:
        - text: "→ Saved to your sip log in "
          style: dim
        - text: "2.1s"
          style: metric-good
    - segments:
        - text: " "
          style: dim
    - segments:
        - text: "✓ Next up: "
          style: success
        - text: "Kenya AA from your Wanna Sip list"
          style: url
logos:
  title: Track the details that shape your taste
  items:
    - i-lucide-coffee
    - i-lucide-star
    - i-lucide-notebook-pen
    - i-lucide-bookmark
    - i-lucide-trophy
features:
  headline: Capabilities
  title: Everything your coffee habit needs.
  description: From your first sip to your all-time favorites, Sippd has every tool to build your coffee memory.
  items:
    - icon: i-lucide-coffee
      title: Log Every Coffee
      description: Track drinks, cafes, roasters, and tasting notes in seconds.
    - icon: i-lucide-star
      title: Sip Score
      description: Rate each coffee so your favorites naturally rise to the top.
    - icon: i-lucide-scroll-text
      title: Your Sip Log
      description: Keep a clean, scrollable history of every coffee you had.
    - icon: i-lucide-bookmark
      title: Saved Sips
      description: Bookmark coffees you want to come back to.
    - icon: i-lucide-list-todo
      title: Wanna Sip
      description: Maintain a running list of coffees, cafes, and beans to try next.
    - icon: i-lucide-trophy
      title: Top Sips
      description: See your all-time best coffees automatically organized.
metrics:
  headline: Why it helps
  title: "Built for remembering what was actually good."
  description: Fast logging, clear ratings, and enough detail to make your next order smarter.
  items:
    - value: < 10s
      label: Time to log
      class: text-primary
    - value: "1"
      label: Place for every cup
      class: text-success
    - value: 5+
      label: Tasting details tracked
      class: text-info
    - value: "∞"
      label: Great coffees remembered
      class: text-warning
appPreview:
  headline: See it in action
  title: Your coffee memory, beautifully organized.
  description: Log a sip in seconds. See your scores, notes, and favorites at a glance. Every cup, always remembered.
  features:
    - icon: i-lucide-zap
      title: Log in under 10 seconds
      description: Name, roaster, score, and tasting notes — captured instantly with no friction.
    - icon: i-lucide-star
      title: Smart Sip Score
      description: Your personal rating system surfaces the coffees worth coming back to.
    - icon: i-lucide-history
      title: Full sip history
      description: Every cup you have ever had, searchable and beautifully organized.
cta:
  title: "Happy birthday, TK!\nHere's to many more sips together."
  description: Happy birthday TK! May the wiggler always wig out for you and I pray that you have the best year yet. Thank you for being such a great brother-in-law and for always making us laugh, I hope you enjoy all the coffee and that your reviews are raving, we love you! --Han | TK! So glad to have you in the family and to be able to share a love of coffee with you. I hope this year brings you as much joy as you bring to everyone around you. Happy birthday, and may your sip log be filled with amazing coffees and even better memories! --Larryon 
  command: sippd log --coffee "first favorite"
  links:
    - label: Create your account
      to: /signup
      color: primary
